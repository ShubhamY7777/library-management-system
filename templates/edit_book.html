<!DOCTYPE html>
<html>

<head>

<title>Edit Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2>
✏️ Edit Book
</h2>

<form method="POST">

<input
type="text"
name="title"
class="form-control mb-3"
value="{{ book[1] }}"
required>

<input
type="text"
name="author"
class="form-control mb-3"
value="{{ book[2] }}"
required>

<input
type="text"
name="publisher"
class="form-control mb-3"
value="{{ book[3] }}"
required>

<input
type="text"
name="rack_no"
class="form-control mb-3"
value="{{ book[7] }}">

<input
type="text"
name="shelf_no"
class="form-control mb-3"
value="{{ book[8] }}">

<button
class="btn btn-success">

Update Book

</button>

</form>

</div>

</body>

</html>
