<!DOCTYPE html>
<html>

<head>

<title>Manage Books</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">
📚 Manage Books
</h2>

<a href="/admin"
   class="btn btn-secondary mb-3">
Back Dashboard
</a>

<table class="table table-bordered table-hover bg-white">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Title</th>
<th>Author</th>
<th>Publisher</th>
<th>Rack</th>
<th>Shelf</th>
<th>Available</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for book in books %}

<tr>

<td>{{ book[0] }}</td>
<td>{{ book[1] }}</td>
<td>{{ book[2] }}</td>
<td>{{ book[3] }}</td>
<td>{{ book[4] }}</td>
<td>{{ book[5] }}</td>
<td>{{ book[6] }}</td>

<td>

<a href="/edit_book/{{ book[0] }}"
   class="btn btn-warning btn-sm">

Edit

</a>

<a href="/delete_book/{{ book[0] }}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Delete this book?')">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
