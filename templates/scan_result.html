<!DOCTYPE html>
<html>
<head>
    <title>Scan Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>Detected Books</h2>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Book Name</th>
                <th>Author</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>

        {% for book in books %}

        <tr>
            <td>{{ book[1] }}</td>
            <td>{{ book[2] }}</td>

            <td>
                {% if book[5] > 0 %}
                    Available
                {% else %}
                    Not Available
                {% endif %}
            </td>
        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
