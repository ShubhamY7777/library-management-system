<!DOCTYPE html>
<html>
<head>
<title>Register Library</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2>Create Library Account</h2>

<form method="POST">

<input
name="library_name"
class="form-control mb-3"
placeholder="Library Name"
required>

<input
name="college_name"
class="form-control mb-3"
placeholder="School / College Name"
required>

<input
name="incharge_name"
class="form-control mb-3"
placeholder="Library Incharge Name"
required>

<input
name="email"
class="form-control mb-3"
placeholder="Email"
required>

<input
name="phone"
class="form-control mb-3"
placeholder="Phone"
required>

<input
name="state"
class="form-control mb-3"
placeholder="State"
required>

<input
name="city"
class="form-control mb-3"
placeholder="City"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button class="btn btn-primary">
Create Library
</button>

</form>

</div>

</div>

</body>
</html>
